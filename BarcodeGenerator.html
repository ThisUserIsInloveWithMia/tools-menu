    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --brand: #e67e22; --bg: #fdfaf6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #f1f1f1; padding-bottom: 20px; }
        h1 { color: var(--brand); margin: 0; }
        .search-area { margin-bottom: 30px; text-align: center; }
        input { width: 80%; padding: 15px 25px; border-radius: 50px; border: 2px solid #eee; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--brand); box-shadow: 0 0 8px rgba(230, 126, 34, 0.2); }
        
        #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .barcode-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; text-align: center; transition: 0.2s; }
        .barcode-card:hover { transform: scale(1.02); border-color: var(--brand); }
        .prod-name { font-weight: bold; font-size: 14px; margin-bottom: 10px; color: #333; height: 35px; overflow: hidden; }
        .barcode-canvas { max-width: 100%; height: auto; background: #fff; }
        
        .download-btn { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        .download-btn:hover { background: #219150; }
        .price-tag { font-size: 12px; color: #7f8c8d; margin-top: 5px; }
    </style>
</head>
<body>

    function doSearch() {
        const query = document.getElementById('breadSearch').value.toLowerCase();
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';

        if (query.length < 1) return;

        const filtered = breadData.filter(item => item.name.toLowerCase().includes(query));

        filtered.forEach((item, index) => {
            const canvasId = `bc-${index}`;
            const card = document.createElement('div');
            card.className = 'barcode-card';
            card.innerHTML = `
                <div class="prod-name">${item.name}</div>
                <canvas id="${canvasId}" class="barcode-canvas"></canvas>
                <div class="price-tag">Price: ₱${item.price}</div>
                <button class="download-btn" onclick="downloadImage('${canvasId}', '${item.name}')">Download Sticker</button>
            `;
            grid.appendChild(card);

            // Generate the visual barcode
            JsBarcode(`#${canvasId}`, item.code, {
                format: "CODE128",
                width: 2,
                height: 50,
                displayValue: true
            });
        });
    }

    function downloadImage(canvasId, name) {
        const canvas = document.getElementById(canvasId);
        const image = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.href = image;
        link.download = `${name.replace(/\s+/g, '-').toLowerCase()}-barcode.png`;
        link.click();
    }
