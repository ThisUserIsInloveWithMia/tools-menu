    <style>
        :root { --brand: #e67e22; --bg: #fdfaf6; --success: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .wrapper { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #f1f1f1; padding-bottom: 20px; }
        h1 { color: var(--brand); margin: 0; }
        
        /* Filter Bar Styles */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; background: #f9f9f9; padding: 20px; border-radius: 12px; }
        select, input { padding: 12px 20px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; outline: none; }
        input { flex: 2; min-width: 250px; }
        select { flex: 1; min-width: 150px; cursor: pointer; background: white; }
        input:focus, select:focus { border-color: var(--brand); }
        
        .bulk-btn { background: var(--brand); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; height: 50px; transition: 0.3s; }
        .bulk-btn:hover { background: #d35400; transform: translateY(-2px); }

        #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .barcode-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; text-align: center; transition: 0.2s; }
        .barcode-card:hover { border-color: var(--brand); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .cat-tag { font-size: 10px; background: #eee; padding: 2px 8px; border-radius: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .prod-name { font-weight: bold; font-size: 13px; color: var(--dark); height: 40px; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .download-btn { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; font-size: 12px; }
        #statusMsg { color: var(--success); font-weight: bold; text-align: center; display: block; height: 25px; margin-bottom: 10px; }
    </style>
</head>

    function getFilteredList() {
        const query = document.getElementById('breadSearch').value.toLowerCase();
        const cat = document.getElementById('categoryFilter').value;

        return breadData.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(query);
            const matchesCat = (cat === "all" || item.cat === cat);
            return matchesSearch && matchesCat;
        });
    }

    function doSearch() {
        const grid = document.getElementById('results-grid');
        grid.innerHTML = '';
        
        const filtered = getFilteredList();

        filtered.forEach((item, index) => {
            const canvasId = `bc-${index}`;
            const card = document.createElement('div');
            card.className = 'barcode-card';
            card.innerHTML = `
                <span class="cat-tag">${item.cat}</span>
                <div class="prod-name">${item.name}</div>
                <canvas id="${canvasId}" class="barcode-canvas"></canvas>
                <div class="price-tag">₱${item.price}</div>
                <button class="download-btn" onclick="downloadImage('${canvasId}', '${item.name}')">Download PNG</button>
            `;
            grid.appendChild(card);

            JsBarcode(`#${canvasId}`, item.code, {
                format: "CODE128",
                width: 2, height: 60,
                displayValue: true,
                background: "#ffffff"
            });
        });
    }

    function downloadImage(canvasId, name) {
        const canvas = document.getElementById(canvasId);
        const link = document.createElement('a');
        link.href = canvas.toDataURL("image/png");
        link.download = `${name.replace(/\s+/g, '_')}.png`;
        link.click();
    }

    async function downloadAllAsZip() {
        const zip = new JSZip();
        const status = document.getElementById('statusMsg');
        const listToProcess = getFilteredList();

        if (listToProcess.length === 0) {
            alert("No products found to download!");
            return;
        }

        status.innerText = `Processing ${listToProcess.length} barcodes...`;

        for (let item of listToProcess) {
            const tempCanvas = document.getElementById('tempCanvas');
            JsBarcode(tempCanvas, item.code, {
                format: "CODE128",
                width: 2, height: 80,
                displayValue: true,
                text: item.name,
                fontSize: 16,
                background: "#ffffff"
            });

            const blob = await new Promise(resolve => tempCanvas.toBlob(resolve, 'image/png'));
            const safeName = item.name.replace(/[^a-z0-9]/gi, '_');
            zip.file(`${item.cat}/${safeName}.png`, blob);
        }

        const content = await zip.generateAsync({type: "blob"});
        saveAs(content, "KBSBarcodes.zip");
        status.innerText = "Download Complete!";
        setTimeout(() => { status.innerText = ""; }, 3000);
    }

    // Initialize the grid on load
    doSearch();
